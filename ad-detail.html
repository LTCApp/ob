<style>
/* ── Lightbox ── */
.lightbox-overlay { position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.95); z-index:9999; display:none; flex-direction:column; align-items:center; justify-content:center; }
.lightbox-overlay.show { display:flex; }
.lightbox-img-wrap { position:relative; max-width:100vw; max-height:85vh; display:flex; align-items:center; justify-content:center; }
.lightbox-overlay img { max-width:96vw; max-height:82vh; object-fit:contain; border-radius:10px; display:block; touch-action:pinch-zoom; }
.lightbox-close { position:fixed; top:16px; left:16px; width:44px;height:44px; background:rgba(255,255,255,0.15); border:none; border-radius:50%; color:white; font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(8px); z-index:10; }
.lightbox-nav { position:fixed; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.12); border:none; color:white; font-size:32px; padding:12px 18px; cursor:pointer; border-radius:10px; backdrop-filter:blur(4px); z-index:10; }
.lightbox-nav.prev { right:8px; }
.lightbox-nav.next { left:8px; }
.lightbox-counter { color:rgba(255,255,255,0.7); font-size:14px; margin-top:14px; }
.lightbox-thumbs { display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding:4px 12px; max-width:100vw; }
.lightbox-thumbs img { width:54px; height:54px; object-fit:cover; border-radius:8px; cursor:pointer; opacity:0.55; border:2px solid transparent; flex-shrink:0; }
.lightbox-thumbs img.active { opacity:1; border-color:white; }

/* ── Main image clickable ── */
.main-image img { cursor:zoom-in !important; }
.gallery-thumb { cursor:zoom-in !important; }

/* ── Mobile ad-detail ── */
@media (max-width:768px) {
    .ad-detail-layout { grid-template-columns:1fr !important; }
    .ad-detail-images { border-radius:14px; overflow:hidden; }
    .main-image { height:260px !important; border-radius:14px; overflow:hidden; }
    .main-image img { width:100%; height:100%; object-fit:cover; }
    .image-gallery { display:flex; gap:8px; padding:8px; overflow-x:auto; }
    .image-gallery button { width:68px; height:68px; flex-shrink:0; border-radius:10px; overflow:hidden; border:2px solid transparent; padding:0; background:none; }
    .image-gallery button.active { border-color:#2563eb; }
    .image-gallery button img { width:100%; height:100%; object-fit:cover; }
    .ad-detail-info { padding:16px; }
    .ad-price { font-size:26px !important; }
    .ad-actions { flex-direction:column; gap:10px; }
    .ad-actions a, .ad-actions button { width:100%; justify-content:center; font-size:16px; padding:14px; }
    .btn-whatsapp { font-size:17px !important; padding:15px !important; }
    .ad-seller-card { padding:14px; border-radius:14px; }
    .ad-meta-grid { grid-template-columns:1fr 1fr !important; }
}
</style>

                                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>

        // Change main image function — keeps lightbox onclick
        function changeMainImage(src, idx, btn) {
            const mainImage = document.getElementById('mainImage');
            mainImage.innerHTML = `<img src="${src}" alt="صورة" onclick="openLightbox(window._adImages,${idx})" style="cursor:zoom-in;">`;

            document.querySelectorAll('.image-gallery button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>

<!-- Lightbox -->
<div class="lightbox-overlay" id="adLightbox" onclick="lbClose(event)">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <div class="lightbox-img-wrap">
        <img id="lbImg" src="" alt="">
    </div>
    <div class="lightbox-counter" id="lbCounter"></div>
    <div class="lightbox-thumbs" id="lbThumbs"></div>
    <button class="lightbox-nav prev" onclick="lbNav(-1);event.stopPropagation()">›</button>
    <button class="lightbox-nav next" onclick="lbNav(1);event.stopPropagation()">‹</button>
</div>

<script>
// ── Lightbox ──
var _lb = { imgs:[], i:0 };
function openLightbox(imgs, idx) {
    if (!imgs || !imgs.length) return;
    _lb.imgs = imgs; _lb.i = idx || 0;
    lbRender();
    document.getElementById('adLightbox').classList.add('show');
    document.body.style.overflow = 'hidden';
}
function closeLightbox() {
    document.getElementById('adLightbox').classList.remove('show');
    document.body.style.overflow = '';
}
function lbClose(e) { if (e.target === document.getElementById('adLightbox')) closeLightbox(); }
function lbNav(dir) {
    _lb.i = (_lb.i + dir + _lb.imgs.length) % _lb.imgs.length;
    lbRender();
}
function lbRender() {
    document.getElementById('lbImg').src = _lb.imgs[_lb.i];
    document.getElementById('lbCounter').textContent = _lb.imgs.length > 1 ? (_lb.i+1)+' / '+_lb.imgs.length : '';
    const thumbsEl = document.getElementById('lbThumbs');
    if (_lb.imgs.length > 1) {
        thumbsEl.innerHTML = _lb.imgs.map((src,i) =>
            '<img src="'+src+'" class="'+(i===_lb.i?'active':'')+'" onclick="lbGoto('+i+')" />'
        ).join('');
    } else { thumbsEl.innerHTML = ''; }
}
function lbGoto(i) { _lb.i = i; lbRender(); }
document.addEventListener('keydown', function(e){
    var lb = document.getElementById('adLightbox');
    if (!lb.classList.contains('show')) return;
    if (e.key==='Escape') closeLightbox();
    if (e.key==='ArrowRight') lbNav(-1);
    if (e.key==='ArrowLeft') lbNav(1);
});

// Swipe support
var _ts = 0;
document.getElementById('adLightbox').addEventListener('touchstart', function(e){ _ts = e.touches[0].clientX; });
document.getElementById('adLightbox').addEventListener('touchend', function(e){
    var dx = _ts - e.changedTouches[0].clientX;
    if (Math.abs(dx) > 50) lbNav(dx > 0 ? 1 : -1);
});
</script>
