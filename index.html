<body class="has-bottom-nav">

    <!-- Hero Section -->
    <section class="hero">
        <div class="container">

                <h1 id="heroTitle">...</h1>

                    <div class="search-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

    <!-- Categories Section -->
    <section class="categories">
        <div class="container">
            <h2 class="section-title">الأقسام</h2>

                <!-- Categories loaded dynamically from database -->
            </div>
        </div>
    </section>

    <!-- Featured Ads Section -->
    <section class="featured-ads" id="featuredAdsSection" style="display: none;">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="#F59E0B">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                    </svg>
                    إعلانات مميزة
                </h2>
                <a href="ads.html" class="btn btn-secondary">عرض الكل</a>
            </div>
            <div class="ads-grid featured-grid" id="featuredAds">
                <!-- Featured ads will be loaded here -->
            </div>
        </div>
    </section>

    <!-- Recent Ads Section -->
    <section class="recent-ads">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">آخر الإعلانات</h2>
                <a href="ads.html" class="btn btn-secondary">عرض الكل</a>
            </div>
            <div class="ads-grid" id="recentAds">
                <!-- Ads will be loaded here -->
                <div class="loading-spinner">
                    <div class="spinner"></div>
                    <p>جاري تحميل الإعلانات...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                            <rect width="40" height="40" rx="10" fill="#2563EB"/>
                            <path d="M12 20L18 14L24 20L18 26L12 20Z" fill="white"/>
                            <path d="M20 14L26 20L20 26L14 20L20 14Z" fill="white" fill-opacity="0.7"/>
                        </svg>
                        <span id="footerSiteName"></span>
                    </a>
                </div>
                <div class="footer-links">
                    <h3>روابط سريعة</h3>
                    <a href="index.html">الرئيسية</a>
                    <a href="ads.html">الإعلانات</a>
                    <a href="add-ad.html">أضف إعلانك</a>
                </div>
                <div class="footer-contact">
                    <h3>تواصل معنا</h3>
                    <p>للإعلان أو الاستفسارات</p>
                    <a href="https://wa.me/201000000000" target="_blank" class="whatsapp-link">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">

        </div>

    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Update header based on login status
        document.addEventListener('DOMContentLoaded', () => {
            const headerActions = document.querySelector('.header-actions');
            if (!headerActions) return;

            const user = Auth.getCurrentUser();

            if (user) {
                // User is logged in - show dashboard button
                headerActions.innerHTML = `
                    <a href="dashboard.html" class="btn btn-secondary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        <span>حسابي</span>
                    </a>
                    <a href="add-ad.html" class="btn btn-primary">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        <span>أضف إعلان</span>
                    </a>
                    <button class="menu-toggle" id="menuToggle" aria-label="القائمة">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                `;
            }
            // If not logged in, keep original buttons

            // Mobile menu toggle
            const menuToggle = document.getElementById('menuToggle');
            const nav = document.getElementById('nav');
            if (menuToggle && nav) {
                menuToggle.addEventListener('click', () => {
                    nav.classList.toggle('show');
                });
            }

            // Hide static content until dynamic content loads
            const staticContent = document.querySelectorAll('.hero-content h1, .hero-content p, .footer-brand p, .footer-links, .footer-contact h3, .footer-contact p, .footer-bottom p, .header .logo span');
            staticContent.forEach(el => {
                if (el.tagName === 'SPAN' || el.tagName === 'P' || el.tagName === 'H1' || el.tagName === 'H3') {
                    el.style.visibility = 'hidden';
                }
            });

            // Load Site Info from database
            loadSiteInfo().then(() => {
                // Show content after loading
                staticContent.forEach(el => {
                    el.style.visibility = 'visible';
                });
            });

            // Load Categories from database
            if (typeof CATEGORIES !== 'undefined' && CATEGORIES.length > 0) {
                loadCategories();
            } else {
                window.addEventListener('appDataLoaded', loadCategories);
            }

            // Load Featured Ads
            loadFeaturedAds();

            // Load Recent Ads
            loadRecentAds();
        });

        // Load Site Info from Database
        async function loadSiteInfo() {
            try {
                // Try to fetch site settings from database
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/site_settings?select=*&limit=1`,
                    {
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (response.ok) {
                    const settings = await response.json();
                    if (settings && settings.length > 0) {
                        const siteName = settings[0].site_name || 'OB';
                        const siteDescription = settings[0].site_description || '';

                        // Update hero section
                        document.getElementById('heroTitle').textContent = siteName + ' - لأهل العبور';
                        document.getElementById('heroDescription').textContent = siteDescription;
                        document.getElementById('heroDescription').style.display = 'block';

                        // Update header logo text
                        const headerLogoSpan = document.querySelector('.header .logo span');
                        if (headerLogoSpan) headerLogoSpan.textContent = siteName;

                        // Update footer
                        document.getElementById('footerSiteName').textContent = siteName;
                        document.getElementById('footerCopyright').textContent = '© 2024 ' + siteName + ' - جميع الحقوق محفوظة.';

                        // Update page title
                        document.title = siteName + ' - منصة بيع وشراء محلية';

                        return;
                    }
                }
            } catch (error) {
                console.log('Site settings not found, using defaults');
            }

            // Default values if no database settings
            document.getElementById('heroTitle').textContent = 'OB - لأهل العبور';
            document.getElementById('heroDescription').textContent = 'منصة محلية لبيع وشراء السلع والخدمات بين سكان مدينة العبور، تتيح للمستخدمين نشر الإعلانات بسهولة والتواصل المباشر عبر واتساب.';
            document.getElementById('heroDescription').style.display = 'block';

            const headerLogoSpan = document.querySelector('.header .logo span');
            if (headerLogoSpan) headerLogoSpan.textContent = 'OB';

            document.getElementById('footerSiteName').textContent = 'OB';
            document.getElementById('footerCopyright').textContent = '© 2024 OB - لأهل العبور. جميع الحقوق محفوظة.';
        }

        // Load Categories from Database
        function loadCategories() {
            const grid = document.getElementById('categoriesGrid');
            if (!grid || typeof CATEGORIES === 'undefined') return;
            
            grid.innerHTML = '';
            CATEGORIES.forEach(cat => {
                const card = document.createElement('a');
                card.href = 'ads.html?category=' + encodeURIComponent(cat.id);
                card.className = 'category-card';
                const label = cat.name || String(cat.id || '').replace(/[_-]?\d{8,}$/, '');
                const visual = cat.logo
                    ? '<img src="' + cat.logo + '" alt="' + label + '" style="width:64px;height:64px;object-fit:contain;border-radius:14px;">'
                    : '<span style="font-size: 48px;">' + (cat.icon || '📁') + '</span>';
                card.innerHTML = '<div class="category-icon">' + visual + '</div><span class="category-name">' + label + '</span>';
                grid.appendChild(card);
            });
        }

        // Load Featured Ads
        async function loadFeaturedAds() {
            const featuredSection = document.getElementById('featuredAdsSection');
            const featuredGrid = document.getElementById('featuredAds');

            if (!featuredSection || !featuredGrid) return;

            try {
                // Fetch featured ads
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/ads?select=*&status=eq.featured&order=created_at.desc&limit=6`,
                    {
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to fetch featured ads');

                const featuredAds = await response.json();

                if (featuredAds && featuredAds.length > 0) {
                    featuredSection.style.display = 'block';
                    featuredGrid.innerHTML = featuredAds.map(ad => createFeaturedAdCard(ad)).join('');
                } else {
                    featuredSection.style.display = 'none';
                }
            } catch (error) {
                console.error('Error loading featured ads:', error);
                featuredSection.style.display = 'none';
            }
        }

        // Load Recent Ads
        async function loadRecentAds() {
            const recentGrid = document.getElementById('recentAds');

            if (!recentGrid) return;

            try {
                // Fetch recent ads (non-featured)
                const response = await fetch(
                    `${SUPABASE_URL}/rest/v1/ads?select=*&status=eq.active&order=created_at.desc&limit=12`,
                    {
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                        }
                    }
                );

                if (!response.ok) throw new Error('Failed to fetch ads');

                const ads = await response.json();

                if (ads && ads.length > 0) {
                    recentGrid.innerHTML = ads.map(ad => App.createAdCard(ad)).join('');
                } else {
                    recentGrid.innerHTML = `
                        <div class="empty-state">
                            <p>لا توجد إعلانات حالياً</p>
                            <a href="add-ad.html" class="btn btn-primary">أضف أول إعلان</a>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading ads:', error);
                recentGrid.innerHTML = `
                    <div class="empty-state">
                        <p>حدث خطأ في تحميل الإعلانات</p>
                        <button class="btn btn-primary" onclick="loadRecentAds()">إعادة المحاولة</button>
                    </div>
                `;
            }
        }

        // Create Featured Ad Card
        function createFeaturedAdCard(ad) {
            // Get category name from CATEGORIES array (loaded from database)
            const categoryName = (typeof CATEGORIES !== 'undefined') 
                ? (CATEGORIES.find(c => c.id === ad.category)?.name || ad.category)
                : ad.category;
            const imageUrl = ad.images && ad.images.length > 0
                ? ad.images[0]
                : 'https://via.placeholder.com/300x200?text=No+Image';

            const whatsappUrl = `https://wa.me/20${ad.whatsapp.replace(/^0+/, '').replace(/\D/g, '')}?text=مرحباً، أريد الاستفسار عن: ${encodeURIComponent(ad.title)}`;

            return `
                <div class="ad-card featured">
                    <div class="featured-badge">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                        مميز
                    </div>
                    <a href="ad-detail.html?id=${ad.id}" class="ad-image">
                        <img src="${imageUrl}" alt="${ad.title}" loading="lazy">
                    </a>
                    <div class="ad-content">
                        <a href="ad-detail.html?id=${ad.id}" class="ad-title">${ad.title}</a>
                        <p class="ad-price">${ad.price.toLocaleString()} جنيه</p>
                        <div class="ad-meta">
                            <span class="ad-category">${categoryName}</span>
                            <span class="ad-location">${ad.neighborhood}</span>
                        </div>
                        <a href="${whatsappUrl}" target="_blank" class="btn btn-whatsapp">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                            </svg>
                            تواصل مع البائع
                        </a>
                    </div>
                </div>
            `;
        }
    </script>
