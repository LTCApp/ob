<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق... - OB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
        }

        .callback-container {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 { font-size: 24px; margin-bottom: 12px; }
        p { opacity: 0.9; font-size: 16px; }

        .error { color: #FCA5A5; }
        .success { color: #86EFAC; }
    </style>
</head>

<body>
    <div class="callback-container">
        <div class="spinner"></div>
        <h1 id="statusTitle">جاري التحقق...</h1>
        <p id="statusText">يرجى الانتظار قليلاً</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <script>
        (async function () {
            const titleEl = document.getElementById('statusTitle');
            const textEl = document.getElementById('statusText');

            try {
                // =========================
                // 1. CREATE SUPABASE CLIENT
                // =========================
                const supabase = window.supabase.createClient(
                    SUPABASE_URL,
                    SUPABASE_ANON_KEY
                );

                // =========================
                // 2. GET SESSION (AUTO HANDLED BY SUPABASE)
                // =========================
                const { data, error } = await supabase.auth.getSession();

                if (error || !data.session) {
                    console.log(error);
                    window.location.href = "login.html";
                    return;
                }

                const session = data.session;
                const user = session.user;

                // =========================
                // 3. SAVE USER LOCALLY
                // =========================
                localStorage.setItem('ob_user', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    name: user.user_metadata?.full_name ||
                          user.user_metadata?.name ||
                          user.email.split('@')[0] ||
                          'مستخدم',
                    picture: user.user_metadata?.avatar_url ||
                             user.user_metadata?.picture,
                    provider: user.app_metadata?.provider
                }));

                // =========================
                // 4. SAVE SESSION
                // =========================
                localStorage.setItem('ob_session', JSON.stringify({
                    access_token: session.access_token,
                    refresh_token: session.refresh_token,
                    expires_at: Date.now() + (session.expires_in * 1000)
                }));

                // =========================
                // 5. SAVE USER TO DATABASE (SAFE)
                // =========================
                try {
                    await supabase.from('users').upsert({
                        id: user.id,
                        email: user.email,
                        name: user.user_metadata?.full_name ||
                              user.user_metadata?.name ||
                              user.email.split('@')[0] ||
                              'مستخدم',
                        provider: user.app_metadata?.provider,
                        avatar_url: user.user_metadata?.avatar_url ||
                                    user.user_metadata?.picture,
                        created_at: user.created_at
                    });
                } catch (dbErr) {
                    console.log("DB insert skipped:", dbErr);
                }

                // =========================
                // 6. SUCCESS UI
                // =========================
                titleEl.textContent = "تم تسجيل الدخول بنجاح!";
                titleEl.classList.add("success");
                textEl.textContent = "جاري التحويل...";

                // =========================
                // 7. REDIRECT (IMPORTANT)
                // =========================
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 700);

            } catch (err) {
                console.error(err);

                document.getElementById('statusTitle').textContent = "حدث خطأ";
                document.getElementById('statusText').textContent = "يرجى المحاولة مرة أخرى";

                setTimeout(() => {
                    window.location.href = "login.html";
                }, 2000);
            }
        })();
    </script>
</body>
</html>
