<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق... - OB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
        }
        .callback-container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            opacity: 0.9;
            font-size: 16px;
        }
        .error {
            color: #FCA5A5;
        }
        .success {
            color: #86EFAC;
        }
    </style>
</head>
<body>
    <div class="callback-container" id="callbackContainer">
        <div class="spinner"></div>
        <h1 id="statusTitle">جاري التحقق...</h1>
        <p id="statusText">يرجى الانتظار قليلاً</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        // OAuth Callback Handler
        (async function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const provider = urlParams.get('provider');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');

            const titleEl = document.getElementById('statusTitle');
            const textEl = document.getElementById('statusText');
            const container = document.getElementById('callbackContainer');

            // Handle errors
            if (error) {
                titleEl.textContent = 'حدث خطأ';
                titleEl.classList.add('error');
                textEl.textContent = errorDescription || error;
                container.classList.add('error');

                setTimeout(() => {
                    window.location.href = 'login.html?error=' + encodeURIComponent(error);
                }, 3000);
                return;
            }

            // If we have a code, exchange it for a session
            if (code && provider) {
                try {
                    titleEl.textContent = 'جاري تسجيل الدخول...';

                    // Exchange code for session using Supabase Auth API
                    const response = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=pkce`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'apikey': SUPABASE_ANON_KEY
                        },
                        body: JSON.stringify({
                            code: code,
                            provider: provider,
                            redirect_to: window.location.origin + '/auth-callback.html'
                        })
                    });

                    if (!response.ok) {
                        throw new Error('فشل في تسجيل الدخول');
                    }

                    const session = await response.json();

                    // Extract user data
                    const user = session.user;
                    const accessToken = session.access_token;
                    const refreshToken = session.refresh_token;

                    // Decode state for redirect URL
                    let redirectUrl = 'dashboard.html';
                    if (state) {
                        try {
                            const stateData = JSON.parse(atob(state));
                            redirectUrl = stateData.redirect || 'dashboard.html';
                        } catch (e) {
                            console.log('Invalid state parameter');
                        }
                    }

                    // Save user to localStorage
                    localStorage.setItem('ob_user', JSON.stringify({
                        id: user.id,
                        email: user.email,
                        name: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'مستخدم',
                        picture: user.user_metadata?.avatar_url || user.user_metadata?.picture,
                        provider: provider,
                        created_at: user.created_at
                    }));

                    // Save session
                    localStorage.setItem('ob_session', JSON.stringify({
                        access_token: accessToken,
                        refresh_token: refreshToken,
                        expires_at: Date.now() + (session.expires_in * 1000)
                    }));

                    // Save user to database
                    try {
                        await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json',
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${accessToken}`,
                                'Prefer': 'resolution=merge-duplicates'
                            },
                            body: JSON.stringify({
                                id: user.id,
                                email: user.email,
                                name: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0] || 'مستخدم',
                                provider: provider,
                                avatar_url: user.user_metadata?.avatar_url || user.user_metadata?.picture,
                                created_at: user.created_at
                            })
                        });
                    } catch (e) {
                        console.log('User save error (may already exist):', e);
                    }

                    // Success!
                    titleEl.textContent = 'تم تسجيل الدخول بنجاح!';
                    titleEl.classList.add('success');
                    textEl.textContent = 'جاري التحويل...';

                    // Clean URL and redirect
                    window.history.replaceState({}, document.title, window.location.pathname);

                    setTimeout(() => {
                        window.location.href = redirectUrl;
                    }, 500);

                } catch (error) {
                    console.error('Auth callback error:', error);
                    titleEl.textContent = 'حدث خطأ';
                    titleEl.classList.add('error');
                    textEl.textContent = 'يرجى المحاولة مرة أخرى';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                }
            } else {
                // No code, redirect to login
                titleEl.textContent = 'لا توجد بيانات';
                textEl.textContent = 'جاري التحويل لصفحة الدخول...';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            }
        })();
    </script>
</body>
</html>
