<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إنشاء حساب - OB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 20px;
        }

        .auth-container {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .auth-logo span {
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
        }

        .auth-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        .social-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            border: 2px solid transparent;
        }

        .social-btn-google {
            background-color: var(--surface);
            color: var(--text);
            border-color: var(--border);
        }

        .social-btn-google:hover {
            background-color: var(--background);
            border-color: #4285F4;
        }

        .social-btn-facebook {
            background-color: #1877F2;
            color: white;
        }

        .social-btn-facebook:hover {
            background-color: #166FE5;
        }

        .social-btn svg {
            width: 24px;
            height: 24px;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
        }

        .auth-loading {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .auth-loading.show {
            display: block;
        }

        .auth-loading .spinner {
            margin: 0 auto 16px;
        }

        .auth-error {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 24px;
            text-align: center;
            display: none;
        }

        .auth-error.show {
            display: block;
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
            color: var(--text-secondary);
            font-size: 14px;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-logo">
                <svg width="48" height="48" viewBox="0 0 40 40" fill="none">
                    <rect width="40" height="40" rx="10" fill="#2563EB"/>
                    <path d="M12 20L18 14L24 20L18 26L12 20Z" fill="white"/>
                    <path d="M20 14L26 20L20 26L14 20L20 14Z" fill="white" fill-opacity="0.7"/>
                </svg>
                <span>OB</span>
            </div>

            <h1 class="auth-title">إنشاء حساب جديد</h1>
            <p class="auth-subtitle">انضم إلينا وابدأ بنشر إعلاناتك</p>

            <div class="auth-error" id="authError"></div>

            <div class="social-buttons" id="socialButtons">
                <button class="social-btn social-btn-google" id="googleRegister">
                    <svg viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span>التسجيل باستخدام Google</span>
                </button>

                <button class="social-btn social-btn-facebook" id="facebookRegister">
                    <svg viewBox="0 0 24 24" fill="white">
                        <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                    </svg>
                    <span>التسجيل باستخدام Facebook</span>
                </button>
            </div>

            <div class="auth-loading" id="authLoading">
                <div class="spinner"></div>
                <p>جاري التحويل...</p>
            </div>

            <p class="auth-footer">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </p>

            <a href="index.html" class="back-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                العودة للرئيسية
            </a>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        function initRegisterPage() {
            console.log('Initializing register page');

            const googleBtn = document.getElementById('googleRegister');
            const facebookBtn = document.getElementById('facebookRegister');
            const socialButtons = document.getElementById('socialButtons');
            const authLoading = document.getElementById('authLoading');
            const authError = document.getElementById('authError');

            if (!googleBtn || !facebookBtn) {
                console.error('Buttons not found');
                return;
            }

            // Check if already logged in
            if (typeof Auth !== 'undefined' && Auth.isLoggedIn()) {
                const urlParams = new URLSearchParams(window.location.search);
                const redirect = urlParams.get('redirect');
                window.location.href = redirect || 'dashboard.html';
                return;
            }

            // Get redirect parameter
            const urlParams = new URLSearchParams(window.location.search);
            const redirectAfterLogin = urlParams.get('redirect');

            function showError(message) {
                authError.textContent = message;
                authError.classList.add('show');
                setTimeout(() => {
                    authError.classList.remove('show');
                }, 5000);
            }

            // Google Register
            googleBtn.addEventListener('click', function() {
                console.log('Google register clicked');
                socialButtons.style.display = 'none';
                authLoading.classList.add('show');

                if (typeof Auth !== 'undefined') {
                    Auth.signInWithGoogle(redirectAfterLogin).catch(function(error) {
                        console.error('Google register error:', error);
                        socialButtons.style.display = 'flex';
                        authLoading.classList.remove('show');
                        showError('حدث خطأ أثناء إنشاء الحساب');
                    });
                } else {
                    console.error('Auth is not defined');
                    socialButtons.style.display = 'flex';
                    authLoading.classList.remove('show');
                    showError('حدث خطأ في تحميل الصفحة، يرجى تحديثها');
                }
            });

            // Facebook Register
            facebookBtn.addEventListener('click', function() {
                console.log('Facebook register clicked');
                socialButtons.style.display = 'none';
                authLoading.classList.add('show');

                if (typeof Auth !== 'undefined') {
                    Auth.signInWithFacebook(redirectAfterLogin).catch(function(error) {
                        console.error('Facebook register error:', error);
                        socialButtons.style.display = 'flex';
                        authLoading.classList.remove('show');
                        showError('حدث خطأ أثناء إنشاء الحساب');
                    });
                } else {
                    console.error('Auth is not defined');
                    socialButtons.style.display = 'flex';
                    authLoading.classList.remove('show');
                    showError('حدث خطأ في تحميل الصفحة، يرجى تحديثها');
                }
            });
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initRegisterPage);
        } else {
            initRegisterPage();
        }
    </script>
</body>
</html>
