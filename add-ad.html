<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أضف إعلانك - OB</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">

    <style>
        .featured-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            background: #FEF3C7;
            border: 2px solid #F59E0B;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<header class="header">
    <div class="container">
        <div class="header-content">
            <a href="index.html" class="logo">
                <span>OB</span>
            </a>
        </div>
    </div>
</header>

<main class="add-ad-page">
<div class="container">

<form id="addAdForm">

    <input id="title" placeholder="عنوان الإعلان" required>
    <input id="price" type="number" placeholder="السعر" required>

    <select id="category" required>
        <option value="">القسم</option>
        <option value="mobiles">موبايلات</option>
        <option value="cars">سيارات</option>
    </select>

    <textarea id="description" placeholder="الوصف" required></textarea>

    <input id="whatsapp" placeholder="01xxxxxxxxx" required>

    <label class="featured-option">
        <input type="checkbox" id="featuredAd">
        إعلان مميز
    </label>

    <button type="submit" id="submitBtn">
        <span id="submitText">نشر الإعلان</span>
    </button>

</form>

</div>
</main>

<script src="js/config.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // 🔥 SAFE AUTH CHECK (FIXED)
    const user = window.Auth?.getCurrentUser?.();

    if (!user) {
        if (window.App?.showToast) {
            App.showToast('يجب تسجيل الدخول أولاً', 'info');
        }

        setTimeout(() => {
            window.location.href = 'login.html?redirect=add-ad.html';
        }, 1200);

        return;
    }

    const form = document.getElementById('addAdForm');
    const submitBtn = document.getElementById('submitBtn');
    const submitText = document.getElementById('submitText');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        if (!window.Auth) {
            alert("Auth not loaded");
            return;
        }

        submitBtn.disabled = true;
        submitText.textContent = 'جاري النشر...';

        try {
            const user = Auth.getCurrentUser();

            const isFeatured = document.getElementById('featuredAd').checked;

            const formData = {
                title: document.getElementById('title').value.trim(),
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                description: document.getElementById('description').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim(),
                user_id: user.id,
                status: isFeatured ? 'featured' : 'active',
                images: []
            };

            const result = await App.supabase.createAd(formData);

            App.showToast('تم نشر الإعلان بنجاح!', 'success');

            setTimeout(() => {
                window.location.href = 'ads.html';
            }, 1200);

        } catch (err) {
            console.error(err);

            App.showToast('حدث خطأ', 'error');

            submitBtn.disabled = false;
            submitText.textContent = 'نشر الإعلان';
        }
    });

});
</script>

</body>
</html>
