<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري التحقق... - OB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2563EB 0%, #1E40AF 100%);
        }
        .callback-container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            opacity: 0.9;
            font-size: 16px;
        }
        .error {
            color: #FCA5A5;
        }
        .success {
            color: #86EFAC;
        }
    </style>
</head>

<body>
    <div class="callback-container" id="callbackContainer">
        <div class="spinner"></div>
        <h1 id="statusTitle">جاري التحقق...</h1>
        <p id="statusText">يرجى الانتظار قليلاً</p>
    </div>

    <script src="js/config.js"></script>
    <script>
        (async function () {
            const urlParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.substring(1));

            const code = urlParams.get('code');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');

            const accessToken = hashParams.get('access_token');
            const refreshToken = hashParams.get('refresh_token');
            const expiresIn = hashParams.get('expires_in');

            const titleEl = document.getElementById('statusTitle');
            const textEl = document.getElementById('statusText');

            // Handle errors
            if (error) {
                titleEl.textContent = 'حدث خطأ';
                titleEl.classList.add('error');
                textEl.textContent = errorDescription || error;

                setTimeout(() => {
                    window.location.href = 'login.html?error=' + encodeURIComponent(error);
                }, 3000);
                return;
            }

            // Case 1: Token in URL hash (implicit flow)
            if (accessToken) {
                try {
                    titleEl.textContent = 'جاري تسجيل الدخول...';

                    const userResponse = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
                        method: 'GET',
                        headers: {
                            'Authorization': `Bearer ${accessToken}`,
                            'apikey': SUPABASE_ANON_KEY
                        }
                    });

                    const user = await userResponse.json();

                    const provider = user.app_metadata?.provider || 'oauth';

                    localStorage.setItem('ob_user', JSON.stringify({
                        id: user.id,
                        email: user.email,
                        name: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0],
                        picture: user.user_metadata?.avatar_url,
                        provider: provider,
                        created_at: user.created_at
                    }));

                    localStorage.setItem('ob_session', JSON.stringify({
                        access_token: accessToken,
                        refresh_token: refreshToken,
                        expires_at: Date.now() + (parseInt(expiresIn) * 1000)
                    }));

                    titleEl.textContent = 'تم تسجيل الدخول بنجاح!';
                    titleEl.classList.add('success');
                    textEl.textContent = 'جاري التحويل...';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);

                } catch (e) {
                    console.error(e);
                    window.location.href = 'login.html';
                }
            }

            // Case 2: PKCE code flow (FIXED)
            else if (code) {
                try {
                    titleEl.textContent = 'جاري تسجيل الدخول...';

                    // ✅ FIX: Let Supabase handle session automatically
                    const { data, error: sessionError } = await supabase.auth.getSession();

                    if (sessionError || !data?.session) {
                        throw new Error('فشل تسجيل الدخول');
                    }

                    const session = data.session;
                    const user = session.user;
                    const provider = user.app_metadata?.provider || 'oauth';

                    localStorage.setItem('ob_user', JSON.stringify({
                        id: user.id,
                        email: user.email,
                        name: user.user_metadata?.full_name || user.user_metadata?.name || user.email?.split('@')[0],
                        picture: user.user_metadata?.avatar_url,
                        provider: provider,
                        created_at: user.created_at
                    }));

                    localStorage.setItem('ob_session', JSON.stringify({
                        access_token: session.access_token,
                        refresh_token: session.refresh_token,
                        expires_at: Date.now() + (session.expires_in * 1000)
                    }));

                    titleEl.textContent = 'تم تسجيل الدخول بنجاح!';
                    titleEl.classList.add('success');
                    textEl.textContent = 'جاري التحويل...';

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);

                } catch (e) {
                    console.error('Auth error:', e);
                    window.location.href = 'login.html';
                }
            }

            // No data
            else {
                window.location.href = 'login.html';
            }
        })();
    </script>
</body>
</html>
